<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>COCoLa おでかけMAP</title>
  <meta name="description" content="千葉ニュータウンエリアの市民おすすめスポットを地図で見られる埋め込み用Webアプリ">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700;800&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./assets/styles.css">
</head>
<body>
  <div class="app-shell">
    <header class="hero">
      <div class="hero__copy">
        <p class="eyebrow">COCoLa Community Map</p>
        <h1>千葉ニュータウンの<br>おすすめを見つける</h1>
        <p class="hero__lead">
          市民のみなさんの投稿をもとに、地域の魅力をカテゴリ別で見られる埋め込み用マップです。
        </p>
      </div>
      <div class="hero__actions">
        <a id="submit-link" class="button button--primary" href="#" target="_blank" rel="noreferrer noopener">スポットを投稿する</a>
        <a id="edit-link" class="button button--secondary" href="#" target="_blank" rel="noreferrer noopener">情報修正を送る</a>
      </div>
    </header>

    <section id="status-panel" class="status-panel" aria-label="設定状況"></section>

    <main class="layout">
      <section class="panel panel--map" aria-labelledby="map-title">
        <div class="panel__header">
          <div>
            <p class="panel__eyebrow">Map</p>
            <h2 id="map-title">おでかけスポットマップ</h2>
          </div>
          <p class="panel__meta" id="map-meta">スポットを読み込み中です...</p>
        </div>

        <div class="toolbar">
          <div class="toolbar__group">
            <label class="field field--search">
              <span class="field__label">キーワード</span>
              <input id="search-input" type="search" placeholder="スポット名・説明で検索">
            </label>
          </div>
          <div class="toolbar__group">
            <p class="toolbar__label">カテゴリ</p>
            <div id="category-filters" class="chip-group" aria-label="カテゴリフィルター"></div>
          </div>
        </div>

        <div class="map-frame">
          <div id="map" class="map" aria-label="スポット地図"></div>
          <div id="map-message" class="map-message" hidden></div>
        </div>

        <div class="boundary-note" id="boundary-note"></div>
      </section>

      <aside class="sidebar">
        <section class="panel panel--detail" aria-labelledby="detail-title">
          <div class="panel__header">
            <div>
              <p class="panel__eyebrow">Detail</p>
              <h2 id="detail-title">スポット詳細</h2>
            </div>
          </div>
          <div id="detail-card" class="detail-card">
            <p class="detail-card__placeholder">地図上のピンまたは一覧からスポットを選ぶと、詳細がここに表示されます。</p>
          </div>
        </section>

        <section class="panel panel--list" aria-labelledby="list-title">
          <div class="panel__header">
            <div>
              <p class="panel__eyebrow">List</p>
              <h2 id="list-title">スポット一覧</h2>
            </div>
            <p class="panel__meta"><span id="result-count">0</span>件表示</p>
          </div>
          <div id="spot-list" class="spot-list" aria-live="polite"></div>
        </section>
      </aside>
    </main>
  </div>

  <script src="./config.js"></script>
  <script type="module" src="./assets/app.js"></script>
</body>
</html>
